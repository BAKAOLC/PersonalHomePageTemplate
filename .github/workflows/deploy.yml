name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Generate asset cache hash
        id: asset-hash
        run: npm run ci:hash-assets

      - name: Restore thumbnail cache file
        uses: actions/cache/restore@v5
        id: cache-thumbnail-cache
        with:
          path: .thumbnail-cache.json
          key: thumbnail-cache-v4-${{ steps.asset-hash.outputs.combined-hash }}
          restore-keys: |
            thumbnail-cache-v4-
            thumbnail-cache-v3-
            thumbnail-cache-v2-
            thumbnail-cache-

      - name: Restore generated thumbnails
        uses: actions/cache/restore@v5
        id: cache-thumbnails
        with:
          path: public/assets/thumbnails
          key: thumbnails-v4-${{ steps.asset-hash.outputs.combined-hash }}
          restore-keys: |
            thumbnails-v4-
            thumbnails-v3-
            thumbnails-v2-
            thumbnails-v1-
            thumbnails-

      - name: Install dependencies
        run: npm ci

      - name: Prepare generated assets
        id: prepare-assets
        run: npm run ci:prepare-thumbnails
        env:
          THUMBNAIL_COMBINED_HASH: ${{ steps.asset-hash.outputs.combined-hash }}
          THUMBNAIL_CACHE_HIT: ${{ steps.cache-thumbnail-cache.outputs.cache-hit }}
          THUMBNAILS_CACHE_HIT: ${{ steps.cache-thumbnails.outputs.cache-hit }}
          THUMBNAIL_CACHE_MATCHED_KEY: ${{ steps.cache-thumbnail-cache.outputs.cache-matched-key }}
          THUMBNAILS_CACHE_MATCHED_KEY: ${{ steps.cache-thumbnails.outputs.cache-matched-key }}

      - name: Run quality gates and build
        run: npm run ci:check

      - name: Save thumbnail cache file
        uses: actions/cache/save@v5
        if: github.event_name == 'push' && steps.prepare-assets.outputs.thumbnail-cache-needs-save == 'true'
        with:
          path: .thumbnail-cache.json
          key: thumbnail-cache-v4-${{ steps.asset-hash.outputs.combined-hash }}

      - name: Save generated thumbnails
        uses: actions/cache/save@v5
        if: github.event_name == 'push' && steps.prepare-assets.outputs.thumbnails-needs-save == 'true'
        with:
          path: public/assets/thumbnails
          key: thumbnails-v4-${{ steps.asset-hash.outputs.combined-hash }}

      - name: Print cache summary
        if: github.event_name == 'push'
        run: npm run ci:cache-summary
        env:
          THUMBNAIL_STRUCTURE_HASH: ${{ steps.asset-hash.outputs.structure-hash }}
          THUMBNAIL_CONTENT_HASH: ${{ steps.asset-hash.outputs.content-hash }}
          THUMBNAIL_SCRIPT_HASH: ${{ steps.asset-hash.outputs.script-hash }}
          THUMBNAIL_COMBINED_HASH: ${{ steps.asset-hash.outputs.combined-hash }}
          THUMBNAIL_CACHE_NEEDS_SAVE: ${{ steps.prepare-assets.outputs.thumbnail-cache-needs-save }}
          THUMBNAILS_NEED_SAVE: ${{ steps.prepare-assets.outputs.thumbnails-needs-save }}

      - name: Setup Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
